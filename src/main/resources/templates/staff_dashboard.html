<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Hostel System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .deco-shape-1 {
            position: fixed;
            top: -50px;
            right: -50px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
        }

        .deco-shape-2 {
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
        }

        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            position: sticky;
            top: 0;
            padding-top: 2rem;
        }

        #sidebar .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        #sidebar .sidebar-header .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #38bdf8, #22c55e);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #sidebar ul li a {
            padding: 15px 25px;
            font-size: 1.1rem;
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.3s;
        }

        #sidebar ul li a:hover,
        #sidebar ul li.active a {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            border-right: 4px solid #38bdf8;
        }

        #sidebar ul li a i {
            margin-right: 15px;
        }

        #content {
            width: 100%;
            padding: 2rem;
            overflow-y: auto;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .glass-card-hover:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .table-glass {
            color: #f8fafc;
        }

        .table-glass th {
            background: transparent;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .table-glass td {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.05);
            vertical-align: middle;
            padding: 1rem 0.5rem;
            color: #fff;
        }

        .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #38bdf8;
            color: #fff;
            border-radius: 8px;
            padding: 0.5rem 1rem;
        }

        .form-select:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #38bdf8;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }

        option {
            background: #1e293b;
            color: #fff;
        }

        .btn-update {
            background: linear-gradient(135deg, #38bdf8, #22c55e);
            border: none;
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s;
        }

        .btn-update:hover {
            transform: scale(1.05);
            color: #fff;
        }

        .badge-pending {
            background: #eab308;
            color: #1e293b;
        }

        .badge-assigned {
            background: #06b6d4;
            color: #fff;
        }

        .badge-progress {
            background: #3b82f6;
            color: #fff;
        }

        .badge-resolved {
            background: #22c55e;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="deco-shape-1"></div>
    <div class="deco-shape-2"></div>

    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="avatar"><i class="bi bi-tools text-white"></i></div>
                <h5 class="text-white mb-0" th:text="${user.name}">Staff Name</h5>
                <small class="text-white-50" style="color: #cbd5e1 !important;">Maintenance Agent</small>
            </div>
            <ul class="list-unstyled">
                <li class="active"><a href="#tasks"><i class="bi bi-list-task"></i> Task Queue</a></li>
                <li class="mt-4">
                    <form th:action="@{/logout}" method="post" class="px-4">
                        <button type="submit" class="btn btn-outline-danger w-100 rounded-pill text-white"><i
                                class="bi bi-box-arrow-left"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </nav>

        <div id="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-white">Field Operations Dashboard</h2>
            </div>

            <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show text-white"
                role="alert" style="background: rgba(34, 197, 94, 0.4); border: 1px solid #4ade80;">
                Task status has been successfully updated in the system map.
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <div class="col-12" id="tasks">
                    <div class="glass-card glass-card-hover">
                        <h4 class="mb-4 text-white"><i class="bi bi-cone-striped"></i> Open Assignments Queue</h4>
                        <div class="table-responsive">
                            <table class="table table-glass table-borderless table-hover text-white">
                                <thead>
                                    <tr>
                                        <th>TID</th>
                                        <th>Context / Breakdown</th>
                                        <th>Unit # Area</th>
                                        <th>Student Name</th>
                                        <th>Update Form Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(complaints)}">
                                        <td colspan="5" class="text-center text-muted py-4"><i
                                                class="bi bi-cup-hot mb-2 fs-2 d-block"></i> No assigned jobs. Take a
                                            break!</td>
                                    </tr>
                                    <tr th:each="comp : ${complaints}">
                                        <td style="color: #cbd5e1" th:text="'#'+${comp.id}"></td>
                                        <td>
                                            <strong class="text-white fs-5" th:text="${comp.title}"></strong><br>
                                            <span class="badge bg-secondary rounded-pill me-1 text-white"
                                                th:text="${comp.category}"></span>
                                            <small style="color: #cbd5e1" th:text="${comp.description}"></small>
                                        </td>
                                        <td class="fw-bold text-info" th:text="${comp.roomNumber}"></td>
                                        <td class="text-white" th:text="${comp.student.name}"></td>
                                        <td style="min-width: 280px;">
                                            <form th:action="@{/staff/complaints/{id}/status(id=${comp.id})}"
                                                method="post" class="d-flex flex-column gap-2">
                                                <label class="form-label text-info fw-bold mb-0"
                                                    style="font-size: 0.85rem;">Modify Live Status</label>
                                                <div class="d-flex gap-2">
                                                    <select name="status" class="form-select w-100 text-white">
                                                        <option value="Assigned"
                                                            th:selected="${comp.status == 'Assigned'}">Level 1 -
                                                            Assigned</option>
                                                        <option value="In Progress"
                                                            th:selected="${comp.status == 'In Progress'}">Level 2 - In
                                                            Progress</option>
                                                        <option value="Resolved"
                                                            th:selected="${comp.status == 'Resolved'}">Level 3 - Issue
                                                            Resolved</option>
                                                    </select>
                                                    <button type="submit"
                                                        class="btn btn-update px-3 shadow-lg">Save</button>
                                                </div>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
