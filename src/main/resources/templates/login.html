<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hostel System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        /* Abstract shapes */
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            background: linear-gradient(135deg, #ff0076, #590fb7);
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -100px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            animation-delay: -3s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(10deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            z-index: 1;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .login-card h2 {
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-card p {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            color: #fff;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-right: none;
            color: #fff;
            border-radius: 10px 0 0 10px;
        }

        .form-control {
            border-left: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
            background: linear-gradient(135deg, #0072ff, #00c6ff);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ffa3ab;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .alert-success-msg {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.4);
            color: #a3ffaf;
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Hostel Management System</p>

            <div th:if="${param.error}" class="alert alert-error text-center p-2 mb-3">
                <i class="bi bi-exclamation-triangle"></i> Invalid email or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-success-msg text-center p-2 mb-3">
                <i class="bi bi-check-circle"></i> You have been logged out.
            </div>

            <div th:if="${param.registered}" class="alert alert-success-msg text-center p-2 mb-3">
                <i class="bi bi-check-circle"></i> Registration successful! Please login.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 0.9rem; margin-bottom:0.2rem">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="username" class="form-control" placeholder="Enter your email" required
                            autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" style="font-size: 0.9rem; margin-bottom:0.2rem">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password"
                            required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary d-flex justify-content-center align-items-center gap-2">
                    <span>Login</span> <i class="bi bi-box-arrow-in-right"></i>
                </button>

                <div class="mt-3 text-center">
                    <a th:href="@{/register}"
                        style="color: #fff; font-size: 0.9rem; text-decoration: none; border-bottom: 1px dotted #fff;">Don't
                        have an account? Sign Up</a>
                </div>
            </form>

            <div class="mt-4 text-center" style="font-size: 0.85rem; color: rgba(255,255,255,0.7);">
                <p class="mb-1">Demo Accounts:</p>
                <b>admin@hostel.com</b> / admin123 <br>
                <b>staff@hostel.com</b> / staff123 <br>
                <b>student@hostel.com</b> / student123
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
